<html>
<head>
    <title>Larry's Predictions</title>
    <style>
      h1 {
        text-align: center;
      }
    </style>
  </head>
<body>
  <h1>Larry's Predictions</h1>
  <br>
  <label for="grain-select">Select a grain:</label>
  <select id="grain-select">
    <option value="wheat">Wheat</option>
    <option value="corn">Corn</option>
    <option value="oats">Oats</option>
  </select>
  <p>Here are my latest predictions:</p>
  <iframe style="width: 100%;height: 100%;border:3px solid black; 
     " src="https://larrycalvert.github.io/charts2/" id="Iframe"></iframe>
    <!--iframe tag-->
  <br>
  <p>Account balance chart:</p>
  <iframe style="width: 100%;height: 100%;border:3px solid black; 
     " src="https://larrycalvert.github.io/charts2/" id="Iframe"></iframe>
    <!--iframe tag-->
      
    <script>
        // Selecting the iframe element
        var frame = document.getElementById("Iframe");
          
        // Adjusting the iframe height onload event
        frame.onload = function()
        // function execute while load the iframe
        {
          // set the height of the iframe as 
          // the height of the iframe content
          frame.style.height = 
          frame.contentWindow.document.body.scrollHeight + 'px';
           
  
         // set the width of the iframe as the 
         // width of the iframe content
         frame.style.width  = 
          frame.contentWindow.document.body.scrollWidth+'px';
              
        }
        </script>
</body>
</html>
