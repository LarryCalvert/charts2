<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larry's Predictions</title>
<style>
    body {
        font-family: Arial, sans-serif;
    }
    #menu {
        text-align: center;
    }
    .dropdown {
        position: relative;
        display: inline-block;
        margin: 10px;
    }
    .dropdown-content {
        display: none;
        position: absolute;
        background-color: #f9f9f9;
        min-width: 160px;
        box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
        z-index: 1;
    }
    .dropdown:hover .dropdown-content {
        display: block;
    }
</style>
</head>
<body>

<h1 style="text-align: center;">Larry's Predictions</h1>

<div id="menu">
    <script>
        function loadGroupData(groupName) {
            fetch(groupName + '.csv')
                .then(response => response.text())
                .then(data => {
                    const lines = data.split('\n');
                    const dropdownContent = document.getElementById(groupName);
                    dropdownContent.innerHTML = '';
                    lines.forEach(line => {
                        const columns = line.split(',');
                        const itemName = columns[0];
                        const itemLink = `${itemName}-buy.html`;
                        dropdownContent.innerHTML += `<a href="${itemLink}" target="iframe">${itemName}</a><br>`;
                    });
                });
        }

        fetch('Groups.csv')
            .then(response => response.text())
            .then(data => {
                const groups = data.split('\n');
                const menu = document.getElementById('menu');
                groups.forEach(group => {
                    const groupName = group.split(',')[2].trim();
                    menu.innerHTML += `<div class="dropdown">
                                            <button>${groupName}</button>
                                            <div class="dropdown-content" id="${groupName}"></div>
                                        </div>`;
                    loadGroupData(groupName);
                });
            });
    </script>
</div>

<iframe name="iframe" width="100%" height="600px" frameborder="0"></iframe>

</body>
</html>
